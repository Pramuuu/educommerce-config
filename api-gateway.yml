server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # Student Service Routes
        - id: student-service
          uri: lb://STUDENT-SERVICE
          predicates:
            - Path=/students/**

        # Authentication Routes (login & register)
        - id: auth-service
          uri: lb://STUDENT-SERVICE
          predicates:
            - Path=/auth/**

        # Attendance Service Routes
        - id: attendance-service
          uri: lb://ATTENDANCE-SERVICE
          predicates:
            - Path=/attendance/**

        # Result Service Routes
        - id: result-service
          uri: lb://RESULT-SERVICE
          predicates:
            - Path=/results/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: "*"
